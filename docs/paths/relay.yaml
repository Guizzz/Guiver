set_relay:
  post:
    summary: Controlla relay
    tags: [Relay]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/relay.yaml#/Relay'
    responses:
      200:
        description: Stato relay aggiornato

get_relay_status:
  get:
    summary: Get all relay info
    tags: [Relay]
    responses:
      200:
        description: All relay info
